<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOC S3 Math — Topic Dashboards</title>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --surface: #16213a;
      --surface2: #1b2945;
      --ink: #e5e7eb;
      --dim: #94a3b8;
      --line: #28365c;
      --accent: #4fc3f7;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Hanken Grotesk", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    /* ── Gallery (Notion-style) ── */
    #gallery-view {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .hub-header {
      padding: 28px 40px 8px;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
    }
    .hub-header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .hub-header p {
      margin: 8px 0 0;
      color: var(--dim);
      font-size: 15px;
      max-width: 560px;
      line-height: 1.5;
    }
    .hub-toolbar {
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      padding: 20px 40px 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .view-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--dim);
      margin-right: 4px;
    }
    .gallery-grid {
      flex: 1;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      padding: 12px 40px 48px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      align-content: start;
    }
    .topic-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      text-align: left;
      padding: 0;
      font: inherit;
      color: inherit;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      display: flex;
      flex-direction: column;
      min-height: 280px;
    }
    .topic-card:hover {
      transform: translateY(-3px);
      border-color: rgba(79, 195, 247, 0.45);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
    }
    .topic-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .card-cover {
      height: 132px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card-cover::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(15, 23, 42, 0.55));
      pointer-events: none;
    }
    .card-icon {
      font-size: 48px;
      line-height: 1;
      opacity: 0.92;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.25));
      z-index: 1;
    }
    .card-body {
      padding: 16px 18px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card-body h2 {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.25;
    }
    .card-desc {
      margin: 0;
      font-size: 13px;
      color: var(--dim);
      line-height: 1.45;
      flex: 1;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .card-tags span {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--line);
      color: var(--dim);
    }

    /* per-topic cover gradients */
    .cover-av { background: linear-gradient(135deg, #1a3a52 0%, #0d2840 50%, #1e4030 100%); }
    .cover-fz { background: linear-gradient(135deg, #2a2848 0%, #1a3355 55%, #3d3520 100%); }
    .cover-in { background: linear-gradient(135deg, #2d1f4e 0%, #1a3355 50%, #3a3520 100%); }
    .cover-pb { background: linear-gradient(135deg, #1e3d32 0%, #1a2845 50%, #4a3820 100%); }
    .cover-pc { background: linear-gradient(135deg, #352848 0%, #1a3355 45%, #2d4a28 100%); }

    /* ── Embedded topic viewer ── */
    #viewer-view {
      display: none;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #viewer-view.active { display: flex; }
    #gallery-view.hidden { display: none; }

    .viewer-bar {
      flex: none;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }
    .back-btn {
      background: var(--surface2);
      border: 1px solid var(--line);
      color: var(--ink);
      font: inherit;
      font-weight: 600;
      font-size: 14px;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.15s, color 0.15s;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .viewer-title-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 10px;
      overflow: hidden;
    }
    .viewer-title {
      font-weight: 700;
      font-size: 15px;
      flex: none;
    }
    .viewer-meta {
      font-size: 13px;
      color: var(--dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .viewer-meta:empty { display: none; }
    .open-link {
      font-size: 13px;
      font-weight: 600;
      color: var(--dim);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
    }
    .open-link:hover { color: var(--accent); border-color: var(--line); }
    #topic-frame {
      flex: 1;
      min-height: 0;
      width: 100%;
      border: 0;
      background: var(--bg);
    }

    @media (max-width: 640px) {
      .hub-header, .hub-toolbar, .gallery-grid { padding-left: 20px; padding-right: 20px; }
      .gallery-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="gallery-view">
    <header class="hub-header">
      <h1>KOC S3 Math</h1>
      <p>Interactive topic dashboards — concept slides, tools, games, and KOC-format worked solutions. Click a card to open.</p>
    </header>
    <div class="hub-toolbar">
      <span class="view-label">Gallery</span>
    </div>
    <div class="gallery-grid" id="gallery-grid" role="list"></div>
  </div>

  <div id="viewer-view" aria-hidden="true">
    <div class="viewer-bar">
      <button type="button" class="back-btn" id="back-btn" aria-label="Back to gallery">&#8592; All topics</button>
      <div class="viewer-title-wrap">
        <span class="viewer-title" id="viewer-title"></span>
        <span class="viewer-meta" id="viewer-meta"></span>
      </div>
      <a class="open-link" id="open-link" href="#" target="_blank" rel="noopener">Open in new tab</a>
    </div>
    <iframe id="topic-frame" title="Topic dashboard" src="about:blank"></iframe>
  </div>

  <script>
    (function () {
      "use strict";

      var TOPICS = [
        {
          id: "area_volume",
          title: "Area & Volume",
          desc: "2D areas and 3D solids — formulas, builder game, and worked solutions (QA2, QA4).",
          path: "topics/area_volume/index.html",
          cover: "cover-av",
          icon: "\u{1F4D0}",
          tags: ["L07\u201309", "Slides", "Tools", "Worked"],
        },
        {
          id: "factorization",
          title: "Factorization",
          subtitle: "KOC S3 Math · Summer 2026 · L01–02 More about Factorization",
          desc: "Identities, cross method, grouping — geometry proofs, slider lab, and Factor Blaster game.",
          path: "topics/factorization/index.html",
          cover: "cover-fz",
          icon: "\u{1F9EE}",
          tags: ["L01\u201302", "Identities", "Cross method", "Game"],
        },
        {
          id: "inequality",
          title: "Inequality",
          desc: "Signs, number lines, and solving — grapher tool, matching game, L03 worked bank.",
          path: "topics/inequality/index.html",
          cover: "cover-in",
          icon: "\u{2264}",
          tags: ["L03", "Number line", "Grapher", "Worked"],
        },
        {
          id: "probability",
          title: "Probability",
          desc: "Formula, tree diagrams, tabulation — card tool, games, L10\u201312 worked solutions.",
          path: "topics/probability/index.html",
          cover: "cover-pb",
          icon: "\u{1F3B4}",
          tags: ["L10\u201312", "Tree", "Cards", "Worked"],
        },
        {
          id: "percentage",
          title: "Percentages",
          desc: "Change factor, interest, tax — interest explorer, RPG game, L04\u201306 worked bank.",
          path: "topics/percentage/index.html",
          cover: "cover-pc",
          icon: "\u{0025}",
          tags: ["L04\u201306", "Interest", "Game", "Worked"],
        },
      ];

      var grid = document.getElementById("gallery-grid");
      var galleryView = document.getElementById("gallery-view");
      var viewerView = document.getElementById("viewer-view");
      var frame = document.getElementById("topic-frame");
      var viewerTitle = document.getElementById("viewer-title");
      var viewerMeta = document.getElementById("viewer-meta");
      var openLink = document.getElementById("open-link");
      var backBtn = document.getElementById("back-btn");

      function buildCard(t) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "topic-card";
        btn.setAttribute("role", "listitem");
        btn.dataset.id = t.id;
        btn.innerHTML =
          '<div class="card-cover ' + t.cover + '"><span class="card-icon" aria-hidden="true">' + t.icon + "</span></div>" +
          '<div class="card-body">' +
            "<h2>" + t.title + "</h2>" +
            '<p class="card-desc">' + t.desc + "</p>" +
            '<div class="card-tags">' + t.tags.map(function (x) { return "<span>" + x + "</span>"; }).join("") + "</div>" +
          "</div>";
        btn.addEventListener("click", function () { openTopic(t.id); });
        return btn;
      }

      function findTopic(id) {
        for (var i = 0; i < TOPICS.length; i++) {
          if (TOPICS[i].id === id) return TOPICS[i];
        }
        return null;
      }

      function openTopic(id) {
        var t = findTopic(id);
        if (!t) return;
        viewerTitle.textContent = t.title;
        if (viewerMeta) viewerMeta.textContent = t.subtitle || "";
        openLink.href = t.path;
        frame.src = t.path;
        galleryView.classList.add("hidden");
        viewerView.classList.add("active");
        viewerView.setAttribute("aria-hidden", "false");
        if (history.replaceState) {
          history.replaceState(null, "", "#" + id);
        } else {
          location.hash = id;
        }
      }

      function closeViewer() {
        frame.src = "about:blank";
        galleryView.classList.remove("hidden");
        viewerView.classList.remove("active");
        viewerView.setAttribute("aria-hidden", "true");
        if (history.replaceState) {
          history.replaceState(null, "", location.pathname + location.search);
        } else {
          location.hash = "";
        }
      }

      TOPICS.forEach(function (t) { grid.appendChild(buildCard(t)); });

      backBtn.addEventListener("click", closeViewer);
      window.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && viewerView.classList.contains("active")) closeViewer();
      });
      window.addEventListener("hashchange", function () {
        var id = (location.hash || "").replace(/^#/, "");
        if (id && findTopic(id)) openTopic(id);
        else if (!id) closeViewer();
      });

      var initial = (location.hash || "").replace(/^#/, "");
      if (initial && findTopic(initial)) openTopic(initial);
    })();
  </script>
</body>
</html>
