<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOC Web — Starter</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-surface-bg text-slate-50 font-sans min-h-screen">
  <main class="max-w-3xl mx-auto px-6 py-16">
    <h1 class="text-4xl font-bold text-brand-500 mb-2">KOC Web</h1>
    <p class="text-slate-400 mb-8">Web design starter with Tailwind, Vite, and KaTeX.</p>

    <section class="bg-surface-card border border-surface-border rounded-xl p-6 mb-6">
      <h2 class="text-xl font-semibold mb-4">Sample Math</h2>
      <div id="math" class="text-2xl"></div>
    </section>

    <section class="flex gap-3">
      <button class="px-4 py-2 bg-brand-600 hover:bg-brand-700 rounded-lg font-medium transition-colors">
        Primary
      </button>
      <button class="px-4 py-2 border border-surface-border hover:bg-surface-card rounded-lg transition-colors">
        Secondary
      </button>
    </section>
  </main>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
