<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOC UI Component Showcase</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50: '#f5f3ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 900: '#312e81' },
            surface: { bg: '#0f172a', card: '#1e293b', border: '#334155' },
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-surface-bg text-slate-50 font-sans p-8">
  <h1 class="text-3xl font-bold text-brand-500 mb-8">UI Component Showcase</h1>

  <div class="grid gap-8 max-w-4xl">
    <section>
      <h2 class="text-lg font-semibold mb-4 text-slate-300">Buttons</h2>
      <div class="flex flex-wrap gap-3">
        <button class="px-4 py-2 bg-brand-600 hover:bg-brand-700 rounded-lg font-medium">Primary</button>
        <button class="px-4 py-2 border border-surface-border hover:bg-surface-card rounded-lg">Secondary</button>
        <button class="px-4 py-2 text-brand-500 hover:text-brand-400">Ghost</button>
      </div>
    </section>

    <section>
      <h2 class="text-lg font-semibold mb-4 text-slate-300">Cards</h2>
      <div class="bg-surface-card border border-surface-border rounded-xl p-6">
        <h3 class="font-semibold mb-2">Card Title</h3>
        <p class="text-slate-400 text-sm">Use for lesson modules, problem sets, or feature blocks.</p>
      </div>
    </section>

    <section>
      <h2 class="text-lg font-semibold mb-4 text-slate-300">Form Inputs</h2>
      <input type="text" placeholder="Enter value…"
        class="w-full max-w-sm px-4 py-2 bg-surface-card border border-surface-border rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-600">
    </section>

    <section>
      <h2 class="text-lg font-semibold mb-4 text-slate-300">Color Palette</h2>
      <div class="flex gap-2">
        <div class="w-12 h-12 rounded-lg bg-brand-500" title="brand-500"></div>
        <div class="w-12 h-12 rounded-lg bg-brand-600" title="brand-600"></div>
        <div class="w-12 h-12 rounded-lg bg-brand-700" title="brand-700"></div>
        <div class="w-12 h-12 rounded-lg bg-surface-card border border-surface-border" title="surface-card"></div>
      </div>
    </section>
  </div>
</body>
</html>
